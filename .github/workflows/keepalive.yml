name: Keep Streamlit App Alive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Ping Streamlit app
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          echo "Pinging $STREAMLIT_APP_URL ..."
          curl -sf --max-time 30 "$STREAMLIT_APP_URL" > /dev/null
          echo "App responded successfully."
