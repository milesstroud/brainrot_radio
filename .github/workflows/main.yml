name: Brainrot Radio — Spotify + Postgres Sync

on:
  schedule:
    - cron: "0 */3 * * *"
    - cron: "30 1-23/3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Spotify token cache
        run: echo '${{ secrets.SPOTIFY_TOKEN_CACHE }}' > .spotify_token_cache
        env:
          SPOTIPY_CACHE_PATH: ${{ github.workspace }}/.spotify_token_cache

      - name: Update Spotify playlist
        env:
          SPINITRON_API_KEY: ${{ secrets.SPINITRON_API_KEY }}
          SPOTIPY_SCOPE: ${{ secrets.SPOTIPY_SCOPE }}
          SPOTIFY_USERNAME: ${{ secrets.SPOTIFY_USERNAME }}
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_SECRET: ${{ secrets.SPOTIPY_SECRET }}
          REDIRECT_URI: ${{ secrets.REDIRECT_URI }}
          SPOTIFY_PLAYLIST_ID: ${{ secrets.SPOTIFY_PLAYLIST_ID }}
          SPOTIPY_CACHE_PATH: ${{ github.workspace }}/.spotify_token_cache
        run: python spin_to_spotify.py

      - name: Sync spins to Postgres
        env:
          SPINITRON_API_KEY: ${{ secrets.SPINITRON_API_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_SCHEMA: ${{ secrets.POSTGRES_SCHEMA }}
        run: python sync_spins_to_postgres.py
